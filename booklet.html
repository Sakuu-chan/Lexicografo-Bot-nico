  <style>
    @import url('https://fonts.googleapis.com/css2?family=Petemoss&display=swap');

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Petemoss", sans-serif;
}

body {
  display: grid;
  place-content: center;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: #0d0d0d;
}

.flipbook {
  width: 1000px;
  height: 780px;
}

.front{
  background-image: url('images/Cover 2.png') !important;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: #000;
  font-weight: 300;
  border: none; 
  font-size: 3rem;
}

.inside {
  background-image: url('images/back 2.png') !important;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.back{
  background-image: url('images/back_cover 2.png') !important;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.flipbook .hard small{
  font-style: italic;
  font-weight: 300;
  font-size: 2rem;
}

.flipbook .page {
  background-image: url('images/page.png');
  background-size: cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
    gap: 10px;
    border: 1px solid rgba(0, 0, 0, 0.11);
}

.page img{
  width: 100%;
  object-fit: cover;
  margin: auto;
}

.flipbook .page small{
  font-size: 2rem;
  margin-bottom: 10px;
}
  </style>
  <title>Lexicografo de Herbología</title>
</head>
